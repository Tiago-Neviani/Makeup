<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deyse Makeup</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="styles.css" />
  </head>
  <body>
    <header class="Cabeçario">
      <p class="cab">A loja de Make que vai até você</p>
      <p class="eça">Produtos a partir de R$ 7,99</p>
    </header>

    <div class="vista">
      <div class="search">
        <img src="Img/Lupa2.png" alt="Lupa" class="Lupa2" />
        <input type="search" placeholder="Pesquisar" autocomplete="off" class="barra"/>
      </div>

      <img src="Img/Logo.jpeg" alt="Logo" class="logotipo" />
      <div class="pessoas">
        <img src="Img/User_icon.jpeg" alt="User_icon" class="User_icon" />
        <img src="Img/MODELO ENFEITADO.jpg" alt="Coração" class="coração"/>
        <img src="Img/MODELO ENFEITADO (1).jpg" alt="carrinho" class="carrinho"/>
      </div>
    </div>
    <div class="um">
      <div class="pesquisa">
        <div class="cat">
          <img src="Img/Menui.jpeg" alt="hamburger" class="menu" />
          <p class="categoria">Categorias</p>
        </div>
        <p class="algo">Batom</p>
        <p class="algo2">Bases</p>
        <p class="cursos">Cursos</p>
      </div>
    </div>

    <div class="produtos"></div>

    <hr/>
    <footer class="rodapé">
      <div class="atendimento">
        <h1 class="textoi">Atendimento</h1>
        <div class="Contato">
          <img src="Img/Whatsapp_img2.jpeg" alt="Whatsapp_img" class="whats" />
          <p>(17) 98167-3774</p>
        </div>
        <div class="Local">
          <img src="Img/Localização.jpeg" alt="Localização" class="Localização"/>
          <p class="pq">Rua Adirce Alves Tremura 338</p>
        </div>
      </div>

      <div class="hela">
        <h1>Ajuda e Suporte</h1>
        <div class="help">
          <p>Formas de pagamento</p>
          <p>Trocas e devoluções</p>
          <p>Etc...</p>
        </div>
      </div>

      <div class="social">
        <h1>Redes Sociais</h1>
        <img src="Img/Insta2.jpeg" alt="Instagram logo" class="insta" />
      </div>
    </footer>
  </body>
</html>
